codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 1
  round: down
  range: "80...100"

  status:
    # The 90% / file bar is non-negotiable but reported as informational
    # only: codecov's branch-aware coverage counter (which tracks per-branch
    # "partials" separately from statement hits) measures stricter than
    # `go tool cover -func`, so some files that pass the local statement-
    # coverage gate fall short on codecov's metric. We keep the target at
    # 90% so the PR comment + dashboard surface the gap visibly, but mark
    # the status check informational so it does not block merges while the
    # team chases the partials down on each file individually.
    project:
      default:
        target: 90%
        threshold: 1%
        if_no_uploads: error
        if_ci_failed: error
        informational: true
    # Patch coverage = new + modified lines in the PR. Same 90% bar with
    # the same informational treatment so coverage-rot regressions stay
    # visible without becoming a merge blocker on legacy-touched files.
    patch:
      default:
        target: 90%
        threshold: 1%
        informational: true

# main.go is the plugin entrypoint (providerserver.Serve) and cannot be
# unit-tested without subprocess machinery. It's the only file conventionally
# outside the coverage gate.
ignore:
  - "main.go"
  - "tools/**/*.go"      # build-tag-gated tool imports, not real code
  - "**/*_test.go"       # tests don't measure coverage of themselves

comment:
  layout: "header, diff, flags, files, footer"
  behavior: default
  require_changes: false
