name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.26"]
        terraform: ["1.10.*", "1.11.*"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false
      - name: Install sops + age (for fixtures)
        env:
          SOPS_VERSION: v3.13.1
        run: |
          # Pin to an explicit release tag — using `releases/latest/download/`
          # with a versioned asset name silently 404s when "latest" advances,
          # and curl happily writes the HTML 404 page as the binary
          # (chmod +x then yields "exec format error" at first call).
          curl -fsSL "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64" \
            -o /usr/local/bin/sops
          chmod +x /usr/local/bin/sops
          /usr/local/bin/sops --version
          sudo apt-get update && sudo apt-get install -y age
      - run: go mod download
      - run: go vet ./...
      - name: go test (with acceptance tests)
        env:
          TF_ACC: "1"
        run: go test -race -count=1 -coverprofile=coverage.out -coverpkg=./... ./...
      - name: Coverage report
        run: go tool cover -func=coverage.out | tail -1

  validate-examples:
    runs-on: ubuntu-latest
    # Pin to the highest supported Terraform: examples may declare a
    # required_version (e.g. >= 1.11 for write-only attributes) that
    # would fail under older versions in the test matrix.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.11.*"
          terraform_wrapper: false
      - name: Validate examples
        run: |
          for d in examples/*/; do
            (cd "$d" && terraform init -backend=false && terraform validate)
          done

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
