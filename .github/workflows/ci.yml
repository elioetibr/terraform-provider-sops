name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go: ["1.26"]
        terraform: ["1.10.*", "1.11.*"]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go }}
          cache: true
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ matrix.terraform }}
          terraform_wrapper: false
      - name: Install sops + age (for fixtures)
        env:
          SOPS_VERSION: v3.13.1
        run: |
          # Pin to an explicit release tag — using `releases/latest/download/`
          # with a versioned asset name silently 404s when "latest" advances,
          # and curl happily writes the HTML 404 page as the binary
          # (chmod +x then yields "exec format error" at first call).
          curl -fsSL "https://github.com/getsops/sops/releases/download/${SOPS_VERSION}/sops-${SOPS_VERSION}.linux.amd64" \
            -o /usr/local/bin/sops
          chmod +x /usr/local/bin/sops
          /usr/local/bin/sops --version
          sudo apt-get update && sudo apt-get install -y age
      - run: go mod download
      - run: go vet ./...
      - name: go test (with acceptance tests)
        env:
          TF_ACC: "1"
        run: go test -race -count=1 -coverprofile=coverage.out -coverpkg=./... ./...
      - name: Coverage report
        run: go tool cover -func=coverage.out | tail -1
      - name: Write coverage summary to job summary
        # Renders a per-file + total coverage table into the GitHub Actions
        # run page (the "Summary" section). Surfaces coverage drift on every
        # PR without leaving GitHub.
        run: |
          {
            echo "## Coverage report (Go ${{ matrix.go }} / Terraform ${{ matrix.terraform }})"
            echo
            echo "| File | Covered / Total | % |"
            echo "|---|---:|---:|"
            awk 'NR>1 {
              split($1, a, ":"); file=a[1]
              total[file]+=$2
              if ($3 > 0) covered[file]+=$2
            }
            END {
              for (f in total) printf "| %s | %d / %d | %.1f%% |\n", f, covered[f]+0, total[f], (covered[f]+0)/total[f]*100
            }' coverage.out | sort
            echo
            echo "**Total:** $(go tool cover -func=coverage.out | awk '/^total:/ {print $NF}')"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage to Codecov
        # Only one matrix entry uploads to avoid double-counting in codecov.
        # Pin to the highest-supported TF version because that one runs the
        # write-only-attribute acceptance tests and yields the broader
        # statement coverage.
        if: matrix.go == '1.26' && matrix.terraform == '1.11.*'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.out
          flags: unittests,acceptance
          fail_ci_if_error: false
          # CODECOV_TOKEN is required because the repository is private.
          # Set it via repo Settings -> Secrets and variables -> Actions.
          token: ${{ secrets.CODECOV_TOKEN }}

  validate-examples:
    runs-on: ubuntu-latest
    # Pin to the highest supported Terraform: examples may declare a
    # required_version (e.g. >= 1.11 for write-only attributes) that
    # would fail under older versions in the test matrix.
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: true
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.11.*"
          terraform_wrapper: false
      - name: Build local provider binary
        run: |
          # The provider is not (yet) published to the public registry.
          # Build the binary locally and point Terraform at it via
          # dev_overrides — that lets `terraform validate` work without
          # going through `terraform init`'s registry lookup.
          mkdir -p /tmp/providers
          go build -o /tmp/providers/terraform-provider-sops .
      - name: Configure terraform dev_overrides
        run: |
          cat > /tmp/dev.tfrc <<'EOF'
          provider_installation {
            dev_overrides {
              "elioetibr/sops" = "/tmp/providers"
            }
            direct {}
          }
          EOF
      - name: Validate examples
        env:
          TF_CLI_CONFIG_FILE: /tmp/dev.tfrc
        run: |
          # With dev_overrides set, `terraform validate` skips the init
          # step entirely and uses the local binary. The framework prints
          # a warning to stderr about overrides being active — that is
          # expected and not an error.
          for d in examples/*/; do
            (cd "$d" && terraform validate)
          done

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26"
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12
