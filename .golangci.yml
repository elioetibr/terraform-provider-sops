run:
  timeout: 5m
  go: "1.23"

linters:
  enable:
    - errcheck
    - gofmt
    - goimports
    - gosimple
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - typecheck
    - unconvert
    - unused

linters-settings:
  goimports:
    local-prefixes: github.com/elioetibr/terraform-provider-sops
